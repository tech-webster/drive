  </head>
  <body
    class="min-h-screen bg-drive-bg font-sans text-drive-text antialiased [line-height:1.55]"
  >
    <div
      aria-hidden="true"
      class="pointer-events-none fixed inset-0 z-0 bg-[radial-gradient(ellipse_120%_80%_at_50%_-20%,rgba(228,168,83,0.06)_0%,transparent_50%),radial-gradient(ellipse_80%_50%_at_100%_50%,rgba(30,35,50,0.4)_0%,transparent_50%)]"
    ></div>
    <div class="relative z-[1] min-h-screen">
      <header
        class="relative flex flex-wrap items-center justify-between gap-4 border-b border-drive-border bg-drive-panel px-4 py-4 sm:px-6"
      >
        <div
          aria-hidden="true"
          class="pointer-events-none absolute right-0 bottom-0 left-0 h-px opacity-50 bg-[linear-gradient(90deg,transparent,rgba(255,127,2,0.2),transparent)]"
        ></div>
        <h1
          class="m-0 flex items-center gap-2 text-[1.625rem] font-medium tracking-[-0.03em] text-drive-text [text-wrap:balance] max-[600px]:text-[1.375rem]"
        >
          <img
            src="/icon.svg"
            alt="TW"
            class="block h-8 w-8 shrink-0 object-contain"
            width="32"
            height="32"
          />
          <span>TW Drive</span>
        </h1>
        <form
          id="search-form"
          class="relative flex min-w-[240px] flex-1 items-center self-stretch sm:max-w-md"
          role="search"
        >
          <i
            class="fa-solid fa-magnifying-glass pointer-events-none absolute left-3 text-xs text-drive-muted"
            aria-hidden="true"
          ></i>
          <input
            id="search-input"
            type="search"
            class="h-11 w-full rounded-[10px] border border-drive-border-strong bg-drive-surface py-2 pr-11 pl-9 text-sm text-drive-text outline-none placeholder:text-drive-faint focus:border-drive-accent focus:ring-2 focus:ring-drive-accent/15"
            placeholder="Search this folder"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search files and folders in the current folder"
          />
          <button
            type="button"
            id="search-clear"
            class="absolute right-2 inline-flex h-7 w-7 items-center justify-center rounded-[6px] border-0 bg-transparent text-drive-muted transition-colors duration-150 hover:bg-drive-surface-hover hover:text-drive-text focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent motion-reduce:transition-none"
            aria-label="Clear search"
            hidden
          >
            <i class="fa-solid fa-xmark text-sm" aria-hidden="true"></i>
          </button>
        </form>

        <div
          class="inline-flex items-center gap-1 rounded-[12px] border border-drive-border bg-drive-surface/80 p-1 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]"
          role="group"
          aria-label="View mode"
        >
          <button
            type="button"
            id="btn-view-list"
            class="inline-flex h-10 items-center gap-2 rounded-[8px] px-3 text-sm font-medium text-drive-text transition-colors duration-150 hover:bg-drive-surface-hover focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent"
            aria-pressed="true"
          >
            <i class="fa-solid fa-list-ul text-sm" aria-hidden="true"></i>
            <span>List</span>
          </button>
          <button
            type="button"
            id="btn-view-cards"
            class="inline-flex h-10 items-center gap-2 rounded-[8px] px-3 text-sm font-medium text-drive-muted transition-colors duration-150 hover:bg-drive-surface-hover hover:text-drive-text focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent"
            aria-pressed="false"
          >
            <i class="fa-solid fa-grip text-sm" aria-hidden="true"></i>
            <span>Cards</span>
          </button>
        </div>

        <div class="flex items-center gap-2">
          <button
            type="button"
            class="inline-flex items-center gap-2 rounded-[10px] border border-drive-accent bg-drive-accent px-4 py-2 text-sm font-medium text-drive-bg touch-manipulation transition-colors duration-150 hover:border-drive-accent-hover hover:bg-drive-accent-hover focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent motion-reduce:transition-none"
            id="btn-new-folder"
          >
            <i class="fa-solid fa-folder-plus" aria-hidden="true"></i>
            <span>New folder</span>
          </button>
          <button
            type="button"
            class="inline-flex items-center gap-2 rounded-[10px] border border-drive-border-strong bg-drive-surface px-4 py-2 text-sm font-medium text-drive-text touch-manipulation transition-colors duration-150 hover:border-drive-muted hover:bg-drive-surface-hover focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent motion-reduce:transition-none"
            id="btn-upload"
          >
            <i class="fa-solid fa-file-arrow-up" aria-hidden="true"></i>
            <span>Upload file</span>
          </button>
          <input
            type="file"
            id="upload-input"
            class="hidden"
            multiple
            aria-label="Upload files to TW Drive"
          />
        </div>
      </header>

      <nav
        class="flex min-h-12 flex-wrap items-center gap-1 border-b border-drive-border bg-drive-surface px-4 py-3 text-[0.8125rem] sm:px-6"
        id="breadcrumb"
        aria-label="Current path"
      >
        <a
          href="#"
          data-path="."
          class="rounded-[6px] px-2 py-1 text-drive-accent no-underline transition-colors duration-150 hover:bg-drive-accent/15 hover:text-drive-accent-hover focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent"
        >Home</a>
      </nav>

      <main
        class="mx-auto max-w-[920px] p-4 sm:p-6"
      >
        <div id="content" class="min-h-[120px]">
          <div class="p-8 text-center text-[0.9375rem] text-drive-muted">Loading…</div>
        </div>
      </main>
    </div>

    <dialog
      id="app-dialog"
      class="m-auto max-h-[85vh] max-w-[90vw] overflow-hidden rounded-[18px] border border-drive-border bg-drive-surface p-0 text-inherit text-drive-text shadow-[0_24px_48px_rgba(0,0,0,0.4),0_0_0_1px_#252830] backdrop:bg-black/70 backdrop:backdrop-blur-[8px] open:flex open:flex-col"
      aria-labelledby="modal-title"
    >
      <div class="flex shrink-0 items-center justify-between border-b border-drive-border px-6 py-4">
        <h2
          id="modal-title"
          class="m-0 min-w-0 overflow-hidden text-ellipsis whitespace-nowrap text-lg font-semibold tracking-[-0.01em]"
        >
          Preview
        </h2>
        <span class="group relative inline-flex">
          <button
            type="button"
            class="inline-flex shrink-0 items-center justify-center rounded-[6px] border-0 bg-transparent p-2 leading-none text-drive-muted transition-colors duration-150 hover:bg-drive-surface-hover hover:text-drive-text focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-drive-accent motion-reduce:transition-none"
            id="modal-close"
            aria-label="Close"
          >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
          <span
            role="tooltip"
            class="pointer-events-none absolute right-0 top-full z-10 mt-2 hidden whitespace-nowrap rounded-[6px] border border-drive-border bg-drive-panel px-2 py-1 text-xs font-medium text-drive-text shadow-[0_8px_24px_rgba(0,0,0,0.35)] group-hover:block group-focus-within:block"
          >Close</span>
        </span>
      </div>
      <div class="min-h-0 flex-1 overflow-auto p-6" id="modal-body"></div>
      <div
        class="flex shrink-0 items-center justify-end gap-2 border-t border-drive-border px-6 py-4"
        id="modal-footer"
      ></div>
    </dialog>

    <script src="https://js.puter.com/v2/"></script>
    <script src="drive.js"></script>
  </body>
</html>
