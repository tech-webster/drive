<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8fafc">
  <title>My Cloud Drive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: "DM Sans", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
      --color-bg: #f8fafc;
      --color-bg-subtle: #f1f5f9;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-border-strong: #cbd5e1;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-bg: #eff6ff;
      --color-danger: #dc2626;
      --color-danger-bg: #fef2f2;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.12);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.5rem;
      --space-6: 2rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      margin: 0;
      min-height: 100vh;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
      box-shadow: var(--shadow-sm);
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .toolbar {
      display: flex;
      gap: var(--space-2);
      align-items: center;
    }

    .btn {
      font-family: var(--font-sans);
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:hover {
      background: var(--color-bg-subtle);
      border-color: var(--color-text-muted);
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-surface), 0 0 0 4px var(--color-primary);
    }

    .btn-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
    }

    .btn-primary:focus-visible {
      box-shadow: 0 0 0 2px var(--color-surface), 0 0 0 4px var(--color-primary);
    }

    .btn-danger {
      background: var(--color-danger);
      color: #fff;
      border-color: var(--color-danger);
    }

    .btn-danger:hover {
      background: #b91c1c;
      border-color: #b91c1c;
    }

    .breadcrumb {
      background: var(--color-surface);
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-1);
      font-size: 0.875rem;
      min-height: 48px;
    }

    .breadcrumb span {
      color: var(--color-text-muted);
    }

    .breadcrumb a {
      color: var(--color-primary);
      text-decoration: none;
      border-radius: var(--radius-sm);
      padding: var(--space-1) var(--space-2);
    }

    .breadcrumb a:hover {
      text-decoration: underline;
      background: var(--color-primary-bg);
    }

    .breadcrumb a:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary);
    }

    .breadcrumb .current {
      color: var(--color-text);
      font-weight: 600;
    }

    .main {
      padding: var(--space-5);
      max-width: 920px;
      margin: 0 auto;
    }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 0;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .file-list li {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border);
      min-height: 56px;
    }

    .file-list li:last-child {
      border-bottom: none;
    }

    .file-list li:hover {
      background: var(--color-bg-subtle);
    }

    .file-list .icon {
      font-size: 1.5rem;
      width: 2.5rem;
      text-align: center;
      flex-shrink: 0;
    }

    .file-list .name {
      flex: 1;
      min-width: 0;
      font-family: var(--font-sans);
      font-size: inherit;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: var(--space-1) 0;
      margin: 0;
      border: none;
      background: none;
      color: inherit;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .file-list .name:hover {
      color: var(--color-primary);
    }

    .file-list .name:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary);
    }

    .file-list .meta {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .file-list .actions {
      display: flex;
      gap: var(--space-1);
      flex-shrink: 0;
    }

    .file-list .actions button {
      font-family: var(--font-sans);
      padding: var(--space-1) var(--space-2);
      font-size: 0.75rem;
      border: none;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .file-list .actions button:hover {
      background: var(--color-border);
      color: var(--color-text);
    }

    .file-list .actions button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary);
    }

    .file-list .actions button.delete:hover {
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-6) var(--space-5);
      color: var(--color-text-muted);
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--color-border);
      font-size: 0.9375rem;
      box-shadow: var(--shadow-sm);
    }

    .loading {
      text-align: center;
      padding: var(--space-6);
      color: var(--color-text-muted);
      font-size: 0.9375rem;
    }

    .error-toast {
      position: fixed;
      bottom: var(--space-5);
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-text);
      color: #fff;
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 1001;
      box-shadow: var(--shadow-lg);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: var(--space-4);
      overscroll-behavior: contain;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      max-width: 90vw;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-border);
      overscroll-behavior: contain;
    }

    .modal-header {
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--color-text-muted);
      padding: var(--space-1) var(--space-2);
      line-height: 1;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-close:hover {
      color: var(--color-text);
      background: var(--color-bg-subtle);
    }

    .modal-close:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary);
    }

    .modal-body {
      padding: var(--space-5);
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .modal-body .preview-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.6;
      max-height: 60vh;
      overflow: auto;
      color: var(--color-text);
    }

    .modal-body .preview-image {
      max-width: 100%;
      max-height: 70vh;
      display: block;
      border-radius: var(--radius-sm);
    }

    .modal-footer {
      padding: var(--space-4) var(--space-5);
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    #upload-input {
      display: none;
    }

    .auth-prompt {
      padding: var(--space-6) var(--space-5);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
    }

    .auth-prompt.hidden {
      display: none;
    }

    .auth-prompt-box {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    .auth-prompt-text {
      margin: 0 0 var(--space-4);
      color: var(--color-text-muted);
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .file-list .meta {
        display: none;
      }
      .main {
        padding: var(--space-4);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn,
      .file-list .actions button,
      .modal-close {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>My Cloud Drive</h1>
    <div class="toolbar">
      <button type="button" class="btn btn-primary" id="btn-new-folder">New folder</button>
      <button type="button" class="btn" id="btn-upload">Upload file</button>
      <button type="button" class="btn" id="btn-sign-out" style="display: none;">Sign out</button>
      <input type="file" id="upload-input" multiple>
    </div>
  </header>

  <div id="auth-prompt" class="auth-prompt hidden">
    <div class="auth-prompt-box">
      <p class="auth-prompt-text">Sign in with Puter to use your cloud drive. You'll be able to create folders, upload files, and manage them here.</p>
      <button type="button" class="btn btn-primary" id="btn-sign-in">Sign in with Puter</button>
    </div>
  </div>

  <nav class="breadcrumb" id="breadcrumb" aria-label="Current path">
    <a href="#" data-path=".">Home</a>
  </nav>

  <main class="main">
    <div id="content">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Preview</h2>
        <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script>
    (function () {
      var APP_ROOT = '.';
      let currentPath = APP_ROOT;
      const contentEl = document.getElementById('content');
      const breadcrumbEl = document.getElementById('breadcrumb');
      const modalOverlay = document.getElementById('modal-overlay');
      const modalTitle = document.getElementById('modal-title');
      const modalBody = document.getElementById('modal-body');
      const modalFooter = document.getElementById('modal-footer');
      const modalClose = document.getElementById('modal-close');
      const uploadInput = document.getElementById('upload-input');
      const authPromptEl = document.getElementById('auth-prompt');
      const signOutBtn = document.getElementById('btn-sign-out');

      function isAuthError(err) {
        if (!err) return false;
        var msg = (err.message || err.toString || '').toString();
        return msg.indexOf('403') !== -1 || msg.indexOf('Forbidden') !== -1 || err.status === 403 || err.statusCode === 403;
      }

      function setAuthState(signedIn) {
        if (signedIn) {
          authPromptEl.classList.add('hidden');
          signOutBtn.style.display = '';
          loadDir();
        } else {
          authPromptEl.classList.remove('hidden');
          signOutBtn.style.display = 'none';
          contentEl.innerHTML = '';
        }
      }

      function onSignInClick() {
        puter.auth.signIn().then(function () {
          setAuthState(true);
        }).catch(function () {
          showError('Sign in failed or was cancelled');
        });
      }

      function initAuth() {
        if (typeof puter === 'undefined' || !puter.auth) {
          setTimeout(initAuth, 50);
          return;
        }
        if (puter.auth.isSignedIn()) {
          setAuthState(true);
        } else {
          setAuthState(false);
        }
      }

      function showError(message) {
        const el = document.createElement('div');
        el.className = 'error-toast';
        el.setAttribute('aria-live', 'polite');
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(function () { el.remove(); }, 3000);
      }

      function renderBreadcrumb() {
        var parts = currentPath === APP_ROOT ? [] : currentPath.split('/');
        var html = '<a href="#" data-path="' + escapeAttr(APP_ROOT) + '">Home</a>';
        var acc = '';
        parts.forEach(function (name) {
          acc = acc ? acc + '/' + name : name;
          html += ' <span>/</span> <a href="#" data-path="' + escapeAttr(acc) + '">' + escapeHtml(name) + '</a>';
        });
        if (parts.length > 0) {
          html += ' <span>/</span> <span class="current">' + escapeHtml(parts[parts.length - 1]) + '</span>';
        } else {
          html = '<a href="#" data-path="' + escapeAttr(APP_ROOT) + '">Home</a> <span class="current">/</span>';
        }
        breadcrumbEl.innerHTML = html;
        breadcrumbEl.querySelectorAll('a').forEach(function (a) {
          a.addEventListener('click', function (e) {
            e.preventDefault();
            currentPath = a.getAttribute('data-path') || APP_ROOT;
            loadDir();
          });
        });
      }

      function escapeAttr(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML.replace(/"/g, '&quot;');
      }
      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function formatSize(bytes) {
        if (bytes === undefined || bytes === null) return '—';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function formatDate(timestamp) {
        if (timestamp === undefined || timestamp === null) return '—';
        const ms = timestamp < 1e12 ? timestamp * 1000 : timestamp;
        const d = new Date(ms);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function loadDir() {
        contentEl.innerHTML = '<div class="loading" aria-live="polite">Loading…</div>';
        renderBreadcrumb();

        puter.fs.readdir(currentPath).then(function (items) {
          if (items.length === 0) {
            contentEl.innerHTML = '<div class="empty-state">This folder is empty. Create a folder or upload a file.</div>';
            return;
          }
          const ul = document.createElement('ul');
          ul.className = 'file-list';
          items.forEach(function (item) {
            const li = document.createElement('li');
            const isDir = item.is_dir === true;
            const icon = isDir ? '📁' : '📄';
            const name = item.name || item.path.split('/').filter(Boolean).pop() || item.path;
            li.innerHTML =
              '<span class="icon" aria-hidden="true">' + icon + '</span>' +
              '<button type="button" class="name" data-path="' + escapeAttr(item.path) + '" data-isdir="' + (isDir ? '1' : '0') + '">' + escapeHtml(name) + '</button>' +
              '<span class="meta">' + (item.size !== undefined ? formatSize(item.size) : '—') + ' · ' + formatDate(item.created) + '</span>' +
              '<div class="actions">' +
              (isDir ? '' : '<button type="button" class="open">Open</button>') +
              '<button type="button" class="rename">Rename</button>' +
              '<button type="button" class="move">Move</button>' +
              '<button type="button" class="delete">Delete</button>' +
              '</div>';
            ul.appendChild(li);
          });
          contentEl.innerHTML = '';
          contentEl.appendChild(ul);

          ul.querySelectorAll('.name').forEach(function (el) {
            el.addEventListener('click', function () {
              const path = this.getAttribute('data-path');
              const isDir = this.getAttribute('data-isdir') === '1';
              if (isDir) {
                currentPath = path.replace(/\/$/, '') || APP_ROOT;
                loadDir();
              } else {
                openFile(path);
              }
            });
          });
          ul.querySelectorAll('button.open').forEach(function (btn) {
            btn.setAttribute('aria-label', 'Open file');
          });
          ul.querySelectorAll('button.rename').forEach(function (btn) {
            btn.setAttribute('aria-label', 'Rename');
          });
          ul.querySelectorAll('button.move').forEach(function (btn) {
            btn.setAttribute('aria-label', 'Move');
          });
          ul.querySelectorAll('button.delete').forEach(function (btn) {
            btn.setAttribute('aria-label', 'Delete');
          });
          ul.querySelectorAll('button.open').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              const path = e.target.closest('li').querySelector('.name').getAttribute('data-path');
              openFile(path);
            });
          });
          ul.querySelectorAll('button.rename').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              const path = e.target.closest('li').querySelector('.name').getAttribute('data-path');
              renameItem(path);
            });
          });
          ul.querySelectorAll('button.move').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              const path = e.target.closest('li').querySelector('.name').getAttribute('data-path');
              moveItem(path);
            });
          });
          ul.querySelectorAll('button.delete').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              const path = e.target.closest('li').querySelector('.name').getAttribute('data-path');
              confirmDelete(path);
            });
          });
        }).catch(function (err) {
          if (isAuthError(err)) {
            setAuthState(false);
            showError('Please sign in to continue');
          } else {
            contentEl.innerHTML = '<div class="empty-state">Could not load folder. ' + escapeHtml(String(err && err.message ? err.message : err)) + '</div>';
            showError('Could not load folder');
          }
        });
      }

      function openFile(path) {
        modalTitle.textContent = path.split('/').filter(Boolean).pop() || path;
        modalBody.innerHTML = '<div class="loading" aria-live="polite">Loading…</div>';
        modalFooter.innerHTML = '';
        modalOverlay.classList.remove('hidden');

        puter.fs.stat(path).then(function (stat) {
          const name = (stat.name || path).toLowerCase();
          const isImage = /\.(jpe?g|png|gif|webp|bmp|svg)$/i.test(name);
          return puter.fs.read(path).then(function (blob) {
            if (isImage) {
              const url = URL.createObjectURL(blob);
              modalBody.innerHTML = '<img class="preview-image" src="' + url + '" alt="Preview">';
              modalOverlay.addEventListener('modal-close-cleanup', function cleanup() {
                URL.revokeObjectURL(url);
                modalOverlay.removeEventListener('modal-close-cleanup', cleanup);
              }, { once: true });
            } else if (/\.(txt|md|json|js|css|html|log)$/i.test(name)) {
              blob.text().then(function (text) {
                modalBody.innerHTML = '<pre class="preview-text">' + escapeHtml(text) + '</pre>';
              });
            } else {
              modalBody.innerHTML = '<p>Preview not available. File: ' + escapeHtml(name) + ' (' + formatSize(stat.size) + ')</p>';
            }
          });
        }).catch(function (err) {
          modalBody.innerHTML = '<p>Could not open file. ' + escapeHtml(String(err && err.message ? err.message : err)) + '</p>';
          showError('Could not open file');
        });
      }

      function confirmDelete(path) {
        const name = path.split('/').filter(Boolean).pop() || path;
        modalTitle.textContent = 'Delete?';
        modalBody.innerHTML = '<p>Delete <strong>' + escapeHtml(name) + '</strong>? This cannot be undone.</p>';
        modalFooter.innerHTML = '<button type="button" class="btn" id="modal-cancel">Cancel</button><button type="button" class="btn btn-danger" id="modal-confirm-delete">Delete</button>';
        modalOverlay.classList.remove('hidden');

        document.getElementById('modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-confirm-delete').addEventListener('click', function () {
          puter.fs.delete(path).then(function () {
            closeModal();
            loadDir();
          }).catch(function (err) {
            showError('Delete failed');
            closeModal();
          });
        });
      }

      function renameItem(path) {
        const name = path.split('/').filter(Boolean).pop() || path;
        const newName = prompt('Rename to:', name);
        if (newName === null || newName.trim() === '') return;
        const parent = path.split('/').slice(0, -1).join('/') || APP_ROOT;
        const newPath = (parent === APP_ROOT ? newName.trim() : parent + '/' + newName.trim());

        puter.fs.rename(path, newPath).then(function () {
          loadDir();
        }).catch(function (err) {
          showError('Rename failed');
        });
      }

      function moveItem(path) {
        const destPath = prompt('Move to directory (e.g. . or folder):', APP_ROOT);
        if (destPath === null) return;
        const dest = destPath.trim() || APP_ROOT;
        puter.fs.move(path, dest).then(function () {
          loadDir();
        }).catch(function (err) {
          showError('Move failed');
        });
      }

      function closeModal() {
        modalOverlay.classList.add('hidden');
        modalOverlay.dispatchEvent(new Event('modal-close-cleanup'));
      }

      modalClose.addEventListener('click', closeModal);
      modalOverlay.addEventListener('click', function (e) {
        if (e.target === modalOverlay) closeModal();
      });

      document.getElementById('btn-sign-in').addEventListener('click', onSignInClick);
      document.getElementById('btn-sign-out').addEventListener('click', function () {
        puter.auth.signOut();
        setAuthState(false);
      });

      document.getElementById('btn-new-folder').addEventListener('click', function () {
        const name = prompt('Folder name:');
        if (name === null || name.trim() === '') return;
        const fullPath = currentPath === APP_ROOT ? name.trim() : currentPath + '/' + name.trim();
        puter.fs.mkdir(fullPath).then(function () {
          loadDir();
        }).catch(function (err) {
          if (isAuthError(err)) {
            setAuthState(false);
            showError('Please sign in to continue');
          } else {
            showError('Could not create folder');
          }
        });
      });

      document.getElementById('btn-upload').addEventListener('click', function () {
        uploadInput.click();
      });
      uploadInput.addEventListener('change', function () {
        if (!uploadInput.files || uploadInput.files.length === 0) return;
        const dirPath = currentPath === APP_ROOT ? APP_ROOT : currentPath;
        puter.fs.upload(uploadInput.files, dirPath).then(function () {
          uploadInput.value = '';
          loadDir();
        }).catch(function (err) {
          if (isAuthError(err)) {
            setAuthState(false);
            showError('Please sign in to continue');
          } else {
            showError('Upload failed');
          }
          uploadInput.value = '';
        });
      });

      initAuth();
    })();
  </script>
</body>
</html>
