<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff7f02" />
    <meta name="color-scheme" content="dark" />
    <title>TW Drive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrap">
      <header class="header">
        <h1 class="header__title">
          <img
            src="https://www.techwebster.com/icon.svg"
            alt="TW"
            class="header__icon"
            width="32"
            height="32"
          />
          <span>Drive</span>
        </h1>
        <div class="toolbar">
          <button type="button" class="btn btn-primary" id="btn-new-folder">
            <i class="fa-solid fa-folder-plus" aria-hidden="true"></i>
            <span>New folder</span>
          </button>
          <button type="button" class="btn" id="btn-upload">
            <i class="fa-solid fa-file-arrow-up" aria-hidden="true"></i>
            <span>Upload file</span>
          </button>
          <input type="file" id="upload-input" multiple />
        </div>
      </header>

      <nav class="breadcrumb" id="breadcrumb" aria-label="Current path">
        <a href="#" data-path=".">Home</a>
      </nav>

      <main class="main">
        <div id="content" class="content-inner">
          <div class="loading">Loading…</div>
        </div>
      </main>
    </div>

    <dialog id="app-dialog" class="modal-dialog" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Preview</h2>
        <button
          type="button"
          class="modal-close"
          id="modal-close"
          aria-label="Close"
        >
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </dialog>

    <script src="https://js.puter.com/v2/"></script>
    <script src="script.js"></script>
  </body>
</html>
