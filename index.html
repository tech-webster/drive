<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b0f" />
    <meta name="color-scheme" content="dark" />
    <title>My Cloud Drive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrap">
      <header class="header">
        <h1 class="header__title">My Cloud Drive</h1>
        <div class="toolbar">
          <button type="button" class="btn btn-primary" id="btn-new-folder">
            New folder
          </button>
          <button type="button" class="btn" id="btn-upload">Upload file</button>
          <button
            type="button"
            class="btn"
            id="btn-sign-out"
            style="display: none"
          >
            Sign out
          </button>
          <input type="file" id="upload-input" multiple />
        </div>
      </header>

      <div id="auth-prompt" class="auth-prompt hidden">
        <div class="auth-prompt-box">
          <p class="auth-prompt-text">
            Sign in with Puter to use your cloud drive. You'll be able to create
            folders, upload files, and manage them here.
          </p>
          <button type="button" class="btn btn-primary" id="btn-sign-in">
            Sign in with Puter
          </button>
        </div>
      </div>

      <nav class="breadcrumb" id="breadcrumb" aria-label="Current path">
        <a href="#" data-path=".">Home</a>
      </nav>

      <main class="main">
        <div id="content" class="content-inner">
          <div class="loading">Loading…</div>
        </div>
      </main>
    </div>

    <div class="modal-overlay hidden" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">Preview</h2>
          <button
            type="button"
            class="modal-close"
            id="modal-close"
            aria-label="Close"
          >
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script src="script.js"></script>
  </body>
</html>
